name: 로또 데이터 수집

on:
  schedule:
    - cron: '0 12 * * 6'  # 토요일 21:00 KST (추첨 후 25분)
    - cron: '0 15 * * 6'  # 일요일 00:00 KST (추첨 후 3.5시간)
    - cron: '0 23 * * 6'  # 일요일 08:00 KST (추첨 후 11.5시간)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4
      
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 의존성 설치
        run: pip install requests
      
      - name: 로또 데이터 수집
        run: python collect_lotto.py

      - name: 전략 추천번호 갱신
        run: python weekly_runner.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add lotto_data.json backtest_results.json
          git diff --staged --quiet || git commit -m "🎱 로또 데이터 업데이트 $(date +'%Y-%m-%d')"
          git push
